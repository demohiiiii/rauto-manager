syntax = "proto3";

package rauto.agent.v1;

service AgentTaskService {
  rpc GetAgentInfo(AgentInfoRequest) returns (AgentInfoResponse);
  rpc GetAgentStatus(AgentStatusRequest) returns (AgentStatusResponse);
  rpc ProbeDevices(ProbeDevicesRequest) returns (ProbeDevicesResponse);
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc UpsertConnection(UpsertConnectionRequest) returns (UpsertConnectionResponse);
  rpc TestConnection(TestConnectionRequest) returns (TestConnectionResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc ListCommandFlowTemplates(ListCommandFlowTemplatesRequest) returns (ListCommandFlowTemplatesResponse);
  rpc GetCommandFlowTemplate(GetCommandFlowTemplateRequest) returns (CommandFlowTemplateDetail);
  rpc UpsertCommandFlowTemplate(UpsertCommandFlowTemplateRequest) returns (CommandFlowTemplateDetail);
  rpc DeleteCommandFlowTemplate(DeleteCommandFlowTemplateRequest) returns (DeleteCommandFlowTemplateResponse);
  rpc ListDeviceProfiles(ListDeviceProfilesRequest) returns (ListDeviceProfilesResponse);
  rpc ListProfileModes(ListProfileModesRequest) returns (ListProfileModesResponse);
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);
  rpc ExecuteTemplate(ExecuteTemplateRequest) returns (ExecuteTemplateResponse);
  rpc ExecuteCommandFlow(ExecuteCommandFlowRequest) returns (ExecuteCommandFlowResponse);
  rpc ExecuteUpload(ExecuteUploadRequest) returns (ExecuteUploadResponse);
  rpc ExecuteTxBlock(ExecuteTxBlockRequest) returns (ExecuteTxBlockResponse);
  rpc ExecuteTxBlockAsync(ExecuteTxBlockRequest) returns (AcceptedTaskResponse);
  rpc ExecuteTxWorkflowAsync(ExecuteTxWorkflowRequest) returns (AcceptedTaskResponse);
  rpc ExecuteOrchestrationAsync(ExecuteOrchestrationRequest) returns (AcceptedTaskResponse);
}

message AgentInfoRequest {}

message AgentStatusRequest {}

message ListConnectionsRequest {}

message ConnectionMeta {
  string name               = 1;
  string host               = 2;
  uint32 port               = 3;
  string device_profile     = 4;
  bool   has_password       = 5;
  string linux_shell_flavor = 6;
}

message ListConnectionsResponse {
  repeated ConnectionMeta connections = 1;
}

message ConnectionRef {
  string          connection_name    = 1;
  string          host               = 2;
  string          username           = 3;
  string          password           = 4;
  optional uint32 port               = 5;
  string          enable_password    = 6;
  string          ssh_security       = 7;
  string          device_profile     = 8;
  string          linux_shell_flavor = 9;
}

message UpsertConnectionRequest {
  string        name          = 1;
  ConnectionRef connection    = 2;
  bool          save_password = 3;
}

message UpsertConnectionResponse {
  string        name         = 1;
  string        path         = 2;
  bool          has_password = 3;
  ConnectionRef connection   = 4;
}

message TestConnectionRequest {
  ConnectionRef connection = 1;
}

message TestConnectionResponse {
  bool   ok                 = 1;
  string host               = 2;
  uint32 port               = 3;
  string username           = 4;
  string ssh_security       = 5;
  string device_profile     = 6;
  string linux_shell_flavor = 7;
}

message ListTemplatesRequest {}

message TemplateMeta {
  string name = 1;
  string path = 2;
}

message ListTemplatesResponse {
  repeated TemplateMeta templates = 1;
}

message ListCommandFlowTemplatesRequest {}

message CommandFlowTemplateMeta {
  string name = 1;
  string path = 2;
}

message ListCommandFlowTemplatesResponse {
  repeated CommandFlowTemplateMeta templates = 1;
}

message GetCommandFlowTemplateRequest {
  string name = 1;
}

message CommandFlowTemplateVarField {
  string          name         = 1;
  string          label        = 2;
  optional string description  = 3;
  string          kind         = 4;
  bool            required     = 5;
  optional string placeholder  = 6;
  repeated string options      = 7;
  optional string default_json = 8;
}

message CommandFlowTemplateDetail {
  string                               name        = 1;
  string                               path        = 2;
  string                               content     = 3;
  repeated CommandFlowTemplateVarField vars_schema = 4;
}

message UpsertCommandFlowTemplateRequest {
  string name    = 1;
  string content = 2;
}

message DeleteCommandFlowTemplateRequest {
  string name = 1;
}

message DeleteCommandFlowTemplateResponse {
  bool ok = 1;
}

message ListDeviceProfilesRequest {}

message ListProfileModesRequest {
  string name = 1;
}

message BuiltinProfileMeta {
  string          name    = 1;
  repeated string aliases = 2;
  string          summary = 3;
}

message CustomProfileMeta {
  string name = 1;
  string path = 2;
}

message ListDeviceProfilesResponse {
  repeated BuiltinProfileMeta builtins = 1;
  repeated CustomProfileMeta  custom   = 2;
  repeated string             all      = 3;
}

message ListProfileModesResponse {
  string          name         = 1;
  string          default_mode = 2;
  repeated string modes        = 3;
}

message ExecuteCommandRequest {
  string        task_id      = 1;
  string        command      = 2;
  string        mode         = 3;
  ConnectionRef connection   = 4;
  string        record_level = 5;
}

message ExecuteTemplateRequest {
  string        task_id      = 1;
  string        template     = 2;
  string        vars_json    = 3;
  string        mode         = 4;
  bool          dry_run      = 5;
  ConnectionRef connection   = 6;
  string        record_level = 7;
}

message ExecuteTxBlockRequest {
  string        task_id                     = 1;
  string        tx_block_json               = 2;
  string        tx_block_template_name      = 3;
  string        tx_block_template_content   = 4;
  string        tx_block_template_vars_json = 5;
  bool          dry_run                     = 6;
  ConnectionRef connection                  = 7;
  string        record_level                = 8;
}

message ExecuteTxWorkflowRequest {
  string        task_id       = 1;
  string        workflow_json = 2;
  bool          dry_run       = 3;
  ConnectionRef connection    = 4;
  string        record_level  = 5;
}

message ExecuteOrchestrationRequest {
  string task_id      = 1;
  string plan_json    = 2;
  string base_dir     = 3;
  bool   dry_run      = 4;
  string record_level = 5;
}

message AcceptedTaskResponse {
  bool   accepted  = 1;
  string task_id   = 2;
  string operation = 3;
  string status    = 4;
}

message ExecuteCommandResponse {
  string          output              = 1;
  optional string recording_jsonl     = 2;
  optional int32  exit_code           = 3;
  optional string result_summary_json = 4;
}

message CommandExecutionResult {
  string          command   = 1;
  bool            success   = 2;
  optional string output    = 3;
  optional string error     = 4;
  optional int32  exit_code = 5;
}

message ExecuteTemplateResponse {
  string                          rendered_commands   = 1;
  repeated CommandExecutionResult executed            = 2;
  optional string                 recording_jsonl     = 3;
  optional string                 result_summary_json = 4;
}

message ExecuteCommandFlowRequest {
  optional string template_name = 1;
  optional string content       = 2;
  optional string vars_json     = 3;
  ConnectionRef   connection    = 4;
  string          record_level  = 5;
}

message ExecuteCommandFlowResponse {
  bool                            success             = 1;
  string                          template_name       = 2;
  repeated CommandExecutionResult outputs             = 3;
  optional string                 recording_jsonl     = 4;
  optional string                 result_summary_json = 5;
}

message ExecuteUploadRequest {
  string          local_path    = 1;
  string          remote_path   = 2;
  optional uint64 timeout_secs  = 3;
  optional uint32 buffer_size   = 4;
  bool            show_progress = 5;
  ConnectionRef   connection    = 6;
  string          record_level  = 7;
}

message ExecuteUploadResponse {
  bool            ok                  = 1;
  string          local_path          = 2;
  string          remote_path         = 3;
  optional string recording_jsonl     = 4;
  optional string result_summary_json = 5;
}

message ExecuteTxBlockResponse {
  string          tx_block_json       = 1;
  optional string tx_result_json      = 2;
  optional string recording_jsonl     = 3;
  optional string result_summary_json = 4;
}

message AgentInfoResponse {
  string          name                  = 1;
  string          version               = 2;
  repeated string capabilities          = 3;
  uint64          uptime_seconds        = 4;
  uint32          connections_count     = 5;
  uint32          templates_count       = 6;
  uint32          custom_profiles_count = 7;
  bool            managed               = 8;
}

message SystemInfo {
  string os       = 1;
  string arch     = 2;
  string hostname = 3;
}

message AgentStatusResponse {
  string     status            = 1;
  uint32     running_tasks     = 2;
  string     last_heartbeat_at = 3;
  string     registered_at     = 4;
  SystemInfo system            = 5;
}

message ProbeDevicesRequest {
  repeated string connections  = 1;
  uint32          timeout_secs = 2;
}

message DeviceProbeResult {
  string          name           = 1;
  string          host           = 2;
  uint32          port           = 3;
  string          device_profile = 4;
  bool            reachable      = 5;
  optional uint64 latency_ms     = 6;
  string          error          = 7;
}

message ProbeDevicesResponse {
  repeated DeviceProbeResult results           = 1;
  uint32                     total             = 2;
  uint32                     reachable_count   = 3;
  uint32                     unreachable_count = 4;
}
